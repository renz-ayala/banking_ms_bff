spring:
  application:
    name: bankingMsBFF
  r2dbc:
    url: r2dbc:postgresql://${DB_HOST}:${DB_PORT}/${DB}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    pool:
      max-size: 5
      initial-size: 2

server:
  port: 11103

services:
  clients: http://localhost:11101/v1/api/clients
  products: http://localhost:11102/v1/api/products

secret_keys:
  codes:
    jwt: ${JWT_SECRET}
    crypt_key: ${CRYPT_KEY}

